name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use the vX.Y.Z format"
            exit 1
          fi

          package_tag="v$(node --print "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "$package_tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_tag"
            exit 1
          fi

          git fetch origin main --depth=1
          if [[ "$GITHUB_SHA" != "$(git rev-parse origin/main)" ]]; then
            echo "Release tags must point at the current main commit"
            exit 1
          fi

          notes_file=".github/releases/${GITHUB_REF_NAME}.md"
          if [[ ! -f "$notes_file" ]]; then
            echo "Missing release notes at $notes_file"
            exit 1
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --verify-tag
          --latest
          --title "FlowForm Studio PRO ${GITHUB_REF_NAME}"
          --notes-file ".github/releases/${GITHUB_REF_NAME}.md"
